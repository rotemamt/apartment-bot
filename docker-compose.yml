services:
  api:
    build: .
    command: uvicorn apartment_bot.dashboard.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./listings.db:/app/listings.db
    # Caps each service's own memory so a runaway process gets killed (and
    # auto-restarted, see `restart:` below) instead of starving the whole
    # host's memory until SSH/HTTPS stop responding - which is what actually
    # happened once when the scheduler's Chrome process hung indefinitely.
    mem_limit: "512m"
    restart: unless-stopped

  scheduler:
    build: .
    command: bash scripts/entrypoint_headed.sh python scripts/run_scheduler.py
    env_file: .env
    # Our process is PID 1 in the container and doesn't reap dead child
    # processes; when Chrome crashes, its process becomes a zombie that
    # piles up forever without this. Docker's built-in tini init handles it.
    init: true
    # Chrome's default 64MB /dev/shm is too small and causes silent crashes
    # under real memory pressure (e.g. with the other 3 services also running).
    shm_size: "1gb"
    # Docker blocks ptrace by default; Chrome's crashpad handler needs it and
    # hangs forever waiting for a handshake that can never complete without
    # this, which looked identical to a random launch failure until traced.
    cap_add:
      - SYS_PTRACE
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./listings.db:/app/listings.db
      - ./telethon_session.session:/app/telethon_session.session
      - yad2_profile:/app/.yad2_browser_profile
      - ./bot_state.json:/app/bot_state.json
    # Highest of the four - this is the one that actually runs Chrome.
    mem_limit: "2g"
    restart: unless-stopped

  bot:
    build: .
    command: python -m apartment_bot.telegram.bot_commands
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./listings.db:/app/listings.db
      - ./bot_state.json:/app/bot_state.json
    mem_limit: "256m"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - api
    mem_limit: "128m"
    restart: unless-stopped

volumes:
  yad2_profile:
