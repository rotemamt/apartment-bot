server {
    listen 80;
    server_name apartmentbot.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name apartmentbot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/apartmentbot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apartmentbot.duckdns.org/privkey.pem;

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        # index.html has no content hash, so it must always be revalidated -
        # otherwise Telegram's in-app browser keeps serving a stale build
        # (with old API endpoints/auth logic baked in) after every deploy.
        add_header Cache-Control "no-cache" always;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        # filenames are content-hashed by Vite, so a cached asset is always
        # the correct one for whatever index.html currently references.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
